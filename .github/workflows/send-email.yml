name: Send Daily Report Email

on:
  push:
    paths:
      - 'reports/**.md'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get report date
        id: date
        run: |
          REPORT=$(ls -t reports/*.md | head -1)
          DATE=$(basename "$REPORT" .md)
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: pip install markdown

      - name: Send HTML email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
        run: |
          python3 - << 'PYEOF'
          import smtplib, os
          import markdown as md_lib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          date = "${{ steps.date.outputs.date }}"

          with open(f"reports/{date}.md", encoding="utf-8") as f:
              md = f.read()

          body = md_lib.markdown(md, extensions=["tables", "fenced_code"])
          css = (
              "body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;"
              "max-width:820px;margin:0 auto;padding:28px;color:#1a1a2e;line-height:1.75;font-size:15px}"
              "h1{font-size:1.65em;border-bottom:3px solid #e94560;padding-bottom:10px;margin-bottom:24px}"
              "h2{font-size:1.15em;color:#fff;background:#0f3460;border-left:5px solid #e94560;"
              "padding:8px 14px;margin-top:36px;border-radius:4px}"
              "h3{font-size:1.05em;color:#533483;margin-top:20px;margin-bottom:6px}"
              "strong{color:#c0392b}"
              "hr{border:none;border-top:1px solid #ddd;margin:28px 0}"
              "a{color:#0f3460;text-decoration:none}"
              "ul{padding-left:22px}li{margin:5px 0}p{margin:6px 0}"
          )
          html_body = (
              f'<!DOCTYPE html><html><head>'
              f'<meta charset="utf-8">'
              f'<meta name="viewport" content="width=device-width,initial-scale=1">'
              f'<title>{date} 科技圈重點整理</title>'
              f'<style>{css}</style>'
              f'</head><body>{body}</body></html>'
          )

          user = os.environ["GMAIL_USER"]
          password = os.environ["GMAIL_APP_PASSWORD"]
          recipients = [r.strip() for r in os.environ["RECIPIENTS"].split(",")]

          msg = MIMEMultipart("alternative")
          msg["Subject"] = f"Tech AI Daily | {date}"
          msg["From"] = user
          msg["To"] = ", ".join(recipients)
          msg.attach(MIMEText(md, "plain", "utf-8"))
          msg.attach(MIMEText(html_body, "html", "utf-8"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(user, password)
              s.sendmail(user, recipients, msg.as_string())

          print(f"EMAIL_SENT to: {', '.join(recipients)}")
          PYEOF
